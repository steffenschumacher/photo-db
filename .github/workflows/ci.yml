name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install system dependencies
        # exiftool is a system binary (not pip-installable) that
        # convert_raw() shells out to for copying EXIF tags (camera/GPS/
        # date) from a RAW original onto the JPEG rawpy produces - installed
        # here so the "raw" extra's code path is actually exercised in CI,
        # matching what a real deployment doing RAW conversion needs.
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl

      - name: Install dependencies
        run: uv sync --extra api --extra raw --dev

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Run tests
        run: uv run pytest -m "not gui and not network" --cov=photo_db --cov-report=term-missing

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .
