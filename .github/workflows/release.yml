name: Release

# Builds and publishes, for every version tag pushed (e.g. v1.2.3):
#   - a multi-arch (amd64 + arm64) backend Docker image, published to GHCR,
#     bundling both the Flask API server and the pdbscanner.py CLI (see
#     README.md "Running the backend with Docker" and
#     server-conf/docker-entrypoint.sh for how the two are dispatched).
#   - standalone, self-contained Windows and macOS builds of the PySide6
#     desktop UI (photodb-ui.py), attached to a GitHub Release. These are
#     unsigned - Windows SmartScreen / macOS Gatekeeper will warn on first
#     launch (see README.md).
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  test:
    # Never publish a release built from code that doesn't pass its own
    # test suite/lint - reuses the exact same steps as ci.yml.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl

      - name: Install dependencies
        run: uv sync --extra api --extra raw --dev

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Run tests
        run: uv run pytest -m "not gui and not network" --cov=photo_db --cov-report=term-missing

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        # DOCKER_BUILD_SUMMARY=false: skip auto-uploading the buildx build
        # record ("<repo>~<random>.dockerbuild") artifact that backs the
        # Actions build summary - it isn't consumed by anything downstream
        # in this workflow, and its download proved flaky in the
        # github-release job (see that job's comment).
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  windows-build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra ui --group build

      - name: Build with PyInstaller
        run: uv run pyinstaller --windowed --name photodb-ui --noconfirm photodb-ui.py

      - name: Zip the build (onedir)
        run: Compress-Archive -Path dist/photodb-ui/* -DestinationPath photodb-ui-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: photodb-ui-windows
          path: photodb-ui-windows.zip

  macos-build:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra ui --group build

      - name: Build with PyInstaller
        run: uv run pyinstaller --windowed --name photodb-ui --noconfirm photodb-ui.py

      - name: Zip the .app bundle
        # ditto (rather than plain zip) preserves the bundle's structure,
        # resource forks, and permissions correctly on macOS.
        run: ditto -c -k --sequesterRsrc --keepParent dist/photodb-ui.app photodb-ui-macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: photodb-ui-macos
          path: photodb-ui-macos.zip

  github-release:
    needs: [docker, windows-build, macos-build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          # docker/build-push-action@v6 also auto-uploads a
          # "<repo>~<random>.dockerbuild" build-record artifact (backing its
          # Actions build summary) alongside the two we actually create -
          # its download proved flaky ("Artifact download failed after 5
          # retries") and we don't need it for the release anyway, so only
          # fetch the artifacts this workflow explicitly produced.
          pattern: photodb-ui-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/photodb-ui-windows/photodb-ui-windows.zip
            artifacts/photodb-ui-macos/photodb-ui-macos.zip
          generate_release_notes: true
