server {
    location / {
        try_files $uri @yourapplication;
    }
    location @yourapplication {
        include uwsgi_params;
        # Leave headroom for application response headers. In particular,
        # Nginx rejects the upstream response as invalid when its headers
        # exceed the platform-default single-page uwsgi_buffer_size.
        uwsgi_buffer_size 16k;
        uwsgi_pass unix:///tmp/uwsgi.sock;
    }
}
